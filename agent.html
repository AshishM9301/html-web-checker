<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="global.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Agent View - HTML Web Checker</title>
  </head>
  <body class="bg-gray-900 text-white min-h-screen">
    <div class="container mx-auto px-4 py-8">
      <header class="text-center mb-12">
        <h1 class="text-4xl font-bold mb-2 text-cyan-400">Agent View</h1>
        <p class="text-gray-400">API endpoint for AI agents</p>
      </header>

      <main class="max-w-2xl mx-auto">
        <div class="bg-gray-800 rounded-lg p-6 border border-gray-700 mb-6">
          <h2 class="text-xl font-semibold mb-4 text-cyan-400">API Usage</h2>
          <div class="bg-gray-900 p-4 rounded overflow-x-auto">
            <code class="text-cyan-300">GET /api/check?url=https://example.com</code>
          </div>
        </div>

        <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
          <h2 class="text-xl font-semibold mb-4 text-cyan-400">Response Format</h2>
          <pre class="bg-gray-900 p-4 rounded text-sm text-gray-300 whitespace-pre-wrap">{
  "success": true,
  "url": "https://example.com",
  "html": "<!doctype html>...",
  "headers": {
    "content-type": "text/html",
    ...
  },
  "status": 200
}</pre>
        </div>
      </main>
    </div>
  </body>
</html>
